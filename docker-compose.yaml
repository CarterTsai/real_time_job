services:
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: rocksdict-demo-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 10

  akhq:
    image: tchiotludo/akhq:0.26.0
    container_name: rocksdict-demo-akhq
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local:
              properties:
                bootstrap.servers: "kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy

  consumer:
    platform: linux/amd64
    image: kafka-consumer:0.0.1
    build:
      context: .
    container_name: kafka-consumer
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: kafka-consumer
      KAFKA_TOPICS: Click
      KAFKA_AUTO_OFFSET_RESET: earliest
      ROCKSDB_PATH: /state/checkpoints
      CHECKPOINT_EVERY_RECORDS: 1000
      CHECKPOINT_EVERY_SECONDS: 5
      COMMIT_KAFKA_OFFSETS: "true"
      POLL_TIMEOUT_SECONDS: 1.0
      LOG_LEVEL: INFO
    volumes:
      - ./consumer-state:/state
      - ./src/:/app
  
  consumer1:
    platform: linux/amd64
    image: kafka-consumer:0.0.1
    build:
      context: .
    container_name: kafka-consumer1
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: kafka-consumer
      KAFKA_TOPICS: Click
      KAFKA_AUTO_OFFSET_RESET: earliest
      ROCKSDB_PATH: /state/checkpoints
      CHECKPOINT_EVERY_RECORDS: 1000
      CHECKPOINT_EVERY_SECONDS: 5
      COMMIT_KAFKA_OFFSETS: "true"
      POLL_TIMEOUT_SECONDS: 1.0
      LOG_LEVEL: INFO
    volumes:
      - ./consumer-state:/state
      - ./src/:/app

volumes:
  consumer-state:
