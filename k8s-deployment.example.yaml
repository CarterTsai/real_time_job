apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocksdict-checkpoint-consumer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rocksdict-checkpoint-consumer
  template:
    metadata:
      labels:
        app: rocksdict-checkpoint-consumer
    spec:
      containers:
        - name: consumer
          image: your-registry/rocksdict-checkpoint-consumer:latest
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: KAFKA_GROUP_ID
              value: "rocksdict-checkpoint-consumer"
            - name: KAFKA_TOPICS
              value: "orders"
            - name: KAFKA_AUTO_OFFSET_RESET
              value: "earliest"
            - name: ROCKSDB_PATH
              value: "/state/checkpoints"
            - name: CHECKPOINT_EVERY_RECORDS
              value: "1000"
            - name: CHECKPOINT_EVERY_SECONDS
              value: "5"
            - name: COMMIT_KAFKA_OFFSETS
              value: "true"
          volumeMounts:
            - name: rocksdb-state
              mountPath: /state
      volumes:
        - name: rocksdb-state
          # Replace emptyDir with a PersistentVolumeClaim if RocksDB must survive pod restarts.
          emptyDir: {}
